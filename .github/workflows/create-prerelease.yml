name: Create Prerelease

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release increment (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease_type:
        description: 'Type of prerelease (rc = Release Candidate, beta = Beta)'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - rc

jobs:
  build:
    runs-on: windows-2025-vs2026
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.get_version.outputs.new_version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Determine Version
        id: get_version
        shell: pwsh
        run: |
          # Get the highest final release version (exclude prereleases, sort by semver)
          $latestFinalTag = (git tag | Where-Object { $_ -notmatch '-(rc|beta)\.' } | Sort-Object { [version]($_ -replace '^v', '') } | Select-Object -Last 1) -replace '^v', ''
          if (-not $latestFinalTag) {
            $latestFinalTag = "0.0.0"
          }
          Write-Host "Latest final release: $latestFinalTag"

          $releaseType = "${{ github.event.inputs.release_type }}"
          $prereleaseType = "${{ github.event.inputs.prerelease_type }}"

          # Calculate what the next version would be based on release type
          $versionParts = $latestFinalTag.Split('.')
          $major = [int]$versionParts[0]
          $minor = [int]$versionParts[1]
          $patch = [int]$versionParts[2]

          switch ($releaseType) {
            "major" { $major++; $minor=0; $patch=0 }
            "minor" { $minor++; $patch=0 }
            "patch" { $patch++ }
          }
          $nextBaseVersion = "$major.$minor.$patch"
          Write-Host "Next base version would be: $nextBaseVersion"
          Write-Host "Prerelease type: $prereleaseType"

          # Check if there are existing prereleases of the selected type for this next version
          $existingPrereleases = git tag | Where-Object { $_ -match "^v$([regex]::Escape($nextBaseVersion))-$prereleaseType\.(\d+)$" }

          if ($existingPrereleases) {
            # Find the highest prerelease number
            $highestNum = $existingPrereleases | ForEach-Object {
              if ($_ -match "-$prereleaseType\.(\d+)$") { [int]$Matches[1] }
            } | Sort-Object | Select-Object -Last 1

            $prereleaseNumber = $highestNum + 1
            Write-Host "Found existing ${prereleaseType}s, highest is $prereleaseType.$highestNum, creating $prereleaseType.$prereleaseNumber"
          } else {
            $prereleaseNumber = 1
            Write-Host "No existing ${prereleaseType}s for $nextBaseVersion, starting at $prereleaseType.1"
          }

          $newVersion = "$nextBaseVersion-$prereleaseType.$prereleaseNumber"
          Write-Host "New version: $newVersion"

          echo "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "new_version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        shell: pwsh

      - name: Update Frontend version
        working-directory: ./Frontend
        shell: pwsh
        run: |
          $content = Get-Content package.json -Raw
          $packageJson = Get-Content package.json -Raw | ConvertFrom-Json
          $packageJson.version = $env:new_version
          $packageJson | ConvertTo-Json -Depth 100 | Set-Content package.json -NoNewline
          Write-Host "Updated version: $(Select-String -Path package.json -Pattern 'version')"

      - name: Build frontend; restore backend and install vpk in parallel
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # vpk install and the NuGet restore don't depend on the frontend, so run them
          # in the background while the frontend builds; both are awaited before publish.
          $vpkJob = Start-Job {
            dotnet tool install -g vpk --version 1.2.0
            if ($LASTEXITCODE -ne 0) { throw "vpk install exited $LASTEXITCODE" }
          }
          $restoreJob = Start-Job -ArgumentList $PWD.Path {
            param($root)
            Set-Location $root
            dotnet restore -r win-x64
            if ($LASTEXITCODE -ne 0) { throw "dotnet restore exited $LASTEXITCODE" }
          }

          Push-Location Frontend
          npm ci
          if ($LASTEXITCODE -ne 0) { throw "npm ci exited $LASTEXITCODE" }
          npm run build
          if ($LASTEXITCODE -ne 0) { throw "npm run build exited $LASTEXITCODE" }
          Pop-Location

          # Copy the frontend build into Resources/wwwroot so dotnet publish embeds it.
          $destination = "./Resources/wwwroot"
          if (-Not (Test-Path -Path $destination)) { New-Item -ItemType Directory -Path $destination -Force | Out-Null }
          Remove-Item -Path "$destination\*" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "./Frontend/dist/*" -Destination $destination -Recurse -Force

          # Native stderr from a job surfaces as error records, so relax ErrorAction and
          # merge it into output; gate success on each job's State (jobs throw on failure).
          $ErrorActionPreference = 'Continue'
          Write-Host "=== vpk tool install ==="
          Receive-Job $vpkJob -Wait 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host "=== dotnet restore -r win-x64 ==="
          Receive-Job $restoreJob -Wait 2>&1 | ForEach-Object { Write-Host $_ }
          if ($vpkJob.State -ne 'Completed') { throw "vpk install job failed (state: $($vpkJob.State))" }
          if ($restoreJob.State -ne 'Completed') { throw "dotnet restore job failed (state: $($restoreJob.State))" }

      - name: Publish the App
        run: dotnet publish -c Release --self-contained -r win-x64 -o publish --no-restore -p:Version=${{ env.new_version }}
        shell: pwsh

      - name: Upload Segra binaries for signing (Pass 1)
        id: upload_unsigned_exe
        uses: actions/upload-artifact@v7
        with:
          name: Segra-exe-unsigned
          path: |
            ./publish/Segra.exe
            ./publish/Segra.dll
          if-no-files-found: error
          retention-days: 1

      - name: Send Pushover notification (Pass 1)
        shell: pwsh
        continue-on-error: true
        run: |
          try {
            Invoke-RestMethod -Method POST -TimeoutSec 15 `
              -Uri "${{ secrets.PUSHOVER_API_URL }}/1/messages.json" `
              -Body @{
                token   = '${{ secrets.PUSHOVER_TOKEN }}'
                user    = '${{ secrets.PUSHOVER_USER }}'
                title   = 'Segra prerelease'
                message = 'Packaging v${{ env.new_version }}'
              } | Out-Null
            Write-Host "Pushover notification sent"
          } catch {
            Write-Warning "Pushover notification failed: $_"
          }

      - name: Sign Segra.exe (Pass 1)
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: Segra
          signing-policy-slug: release-signing
          artifact-configuration-slug: publish
          github-artifact-id: ${{ steps.upload_unsigned_exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./publish

      - name: Package with vpk
        run: vpk pack -u Segra -v ${{ env.new_version }} -p ./publish -e Segra.exe -o ./output --packTitle "Segra" --noPortable -i ./Resources/icon.ico -s ./Resources/splash.png --splashProgressColor "#fecb00" --framework webview2
        shell: pwsh

      - name: Upload Velopack output for signing (Pass 2)
        id: upload_unsigned_output
        uses: actions/upload-artifact@v7
        with:
          name: Segra-output-unsigned
          path: ./output
          if-no-files-found: error
          retention-days: 1

      - name: Send Pushover notification (Pass 2)
        shell: pwsh
        continue-on-error: true
        run: |
          try {
            Invoke-RestMethod -Method POST -TimeoutSec 15 `
              -Uri "${{ secrets.PUSHOVER_API_URL }}/1/messages.json" `
              -Body @{
                token   = '${{ secrets.PUSHOVER_TOKEN }}'
                user    = '${{ secrets.PUSHOVER_USER }}'
                title   = 'Segra prerelease'
                message = 'Finalizing v${{ env.new_version }} installer'
              } | Out-Null
            Write-Host "Pushover notification sent"
          } catch {
            Write-Warning "Pushover notification failed: $_"
          }

      - name: Sign installer + nupkg (Pass 2)
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: Segra
          signing-policy-slug: release-signing
          artifact-configuration-slug: output
          github-artifact-id: ${{ steps.upload_unsigned_output.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./output

      - name: Regenerate Velopack manifests
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem ./output/Segra-*-full.nupkg | Select-Object -First 1
          if (-not $nupkg) { throw "No nupkg found in ./output" }
          $size = $nupkg.Length
          $sha1 = (Get-FileHash $nupkg.FullName -Algorithm SHA1).Hash.ToUpperInvariant()
          $sha256 = (Get-FileHash $nupkg.FullName -Algorithm SHA256).Hash.ToUpperInvariant()
          Write-Host "Signed nupkg: $($nupkg.Name) size=$size sha1=$sha1"

          $releasesPath = './output/RELEASES'
          if (Test-Path $releasesPath) {
            $newLine = "$sha1 $($nupkg.Name) $size"
            [System.IO.File]::WriteAllText((Resolve-Path $releasesPath), $newLine, [System.Text.UTF8Encoding]::new($true))
            Write-Host "Rewrote RELEASES"
          }

          $winJsonPath = './output/releases.win.json'
          if (Test-Path $winJsonPath) {
            $winJson = Get-Content $winJsonPath -Raw | ConvertFrom-Json
            foreach ($asset in $winJson.Assets) {
              if ($asset.FileName -eq $nupkg.Name) {
                $asset.SHA1 = $sha1
                $asset.SHA256 = $sha256
                $asset.Size = $size
              }
            }
            $winJson | ConvertTo-Json -Depth 10 -Compress | Set-Content -Path $winJsonPath -NoNewline -Encoding utf8
            Write-Host "Rewrote releases.win.json"
          }

      - name: Create a Git Tag
        run: |
          git tag v${{ env.new_version }}
          git push origin v${{ env.new_version }}
        shell: pwsh

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Segra
          path: ./output
          retention-days: 1

  pre-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: Segra

      - name: Create GitHub Release (Pre-Release)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          name: "Release v${{ needs.build.outputs.new_version }}"
          prerelease: true
          generate_release_notes: false
          files: |
            ./Segra-win-Setup.exe
            ./RELEASES
            ./releases.win.json
            ./assets.win.json
            ./Segra-${{ needs.build.outputs.new_version }}-full.nupkg

  # Separate, non-blocking job so the release job goes green without waiting on VirusTotal.
  virustotal:
    needs: pre-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: Segra

      - name: Upload installer to VirusTotal
        shell: bash
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          set -euo pipefail
          FILE="./Segra-win-Setup.exe"
          if [ -z "${VT_API_KEY:-}" ]; then
            echo "::warning::VIRUSTOTAL_API_KEY secret not set; skipping VirusTotal upload"
            exit 0
          fi
          if [ ! -f "$FILE" ]; then
            echo "::warning::$FILE not found; skipping VirusTotal upload"
            exit 0
          fi
          # /files caps at 32MB, so request a one-time large-file upload URL instead.
          echo "Requesting VirusTotal upload URL..."
          UPLOAD_URL=$(curl -sS --fail -H "x-apikey: $VT_API_KEY" \
            https://www.virustotal.com/api/v3/files/upload_url | jq -r '.data')
          echo "Uploading $FILE to VirusTotal..."
          ANALYSIS_ID=$(curl -sS --fail -H "x-apikey: $VT_API_KEY" \
            -F "file=@${FILE}" "$UPLOAD_URL" | jq -r '.data.id')
          REPORT_URL="https://www.virustotal.com/gui/file-analysis/$ANALYSIS_ID"
          echo "VirusTotal analysis id: $ANALYSIS_ID"
          echo "Report: $REPORT_URL"
          {
            echo "## VirusTotal"
            echo "Pre-release installer submitted for scanning."
            echo ""
            echo "[View analysis]($REPORT_URL)"
          } >> "$GITHUB_STEP_SUMMARY"